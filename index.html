<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const moneyEl = document.getElementById('money');
const livesEl = document.getElementById('lives');
const roundEl = document.getElementById('round');
const msgEl = document.getElementById('roundMsg');

const path=[
{x:-20,y:260},{x:180,y:260},{x:180,y:120},{x:420,y:120},
{x:420,y:380},{x:700,y:380},{x:700,y:220},{x:920,y:220}
];

let money=500,lives=20,round=1;
let selectedTower=null;
let enemies=[],towers=[],projectiles=[],explosions=[];
let spawning=false,spawnLeft=0,spawnTimer=0;
let gameWon=false;

// ===== TOWERS =====
const towerTypes={
speer:{range:90,rate:40,dmg:3.6,speed:3.2,cost:80,color:'#2e6b3a',ultCost:800},
boog:{range:130,rate:55,dmg:6,speed:2,cost:125,color:'#3a5a2e',ultCost:1000},
geweer:{range:9999,rate:14.4,dmg:1.4,speed:10,cost:400,color:'#444',ultCost:3000},
tsjaadinator:{range:120,rate:5,dmg:2.8,speed:8,cost:2000,color:'#00bcd4',ultCost:15000},
atoom:{range:180,rate:120,dmg:11.5,speed:3,cost:600,color:'#4caf50',bomb:true,ultCost:3500},
katoen:{range:0,rate:9999,dmg:0,speed:0,cost:950,color:'#fff',farm:true,ultCost:6000}
};

const upgradeCosts={
speer:50,boog:100,atoom:350,geweer:300,tsjaadinator:800,katoen:200
};

// ===== ENEMIES =====
const animals=[
{name:'Giraffe',hp:4,speed:1.1,size:14,reward:10,type:'giraffe'},
{name:'Leeuw',hp:6,speed:1.25,size:14,reward:12,type:'leeuw'},
{name:'Neushoorn',hp:12,speed:0.95,size:18,reward:18,type:'neushoorn'},
{name:'Olifant',hp:20,speed:0.8,size:20,reward:25,type:'olifant'}
];

const boss={name:'Malaria Mug',hp:15000,speed:0.75,reward:1000,type:'mug',boss:true};

// ===== UI =====
function msg(t){
msgEl.textContent=t;
setTimeout(()=>msgEl.textContent='',2000);
}

function selectTower(t){selectedTower=t;}

// ===== CLICK =====
canvas.onclick=e=>{
if(gameWon) return;
const r=canvas.getBoundingClientRect();
const x=e.clientX-r.left,y=e.clientY-r.top;

for(const t of towers){
if(Math.hypot(t.x-x,t.y-y)<18){upgrade(t);return;}
}

if(!selectedTower) return;
const cfg=towerTypes[selectedTower];
if(money<cfg.cost) return;

money-=cfg.cost;
towers.push({x,y,key:selectedTower,cool:0,
dmg:cfg.dmg,rate:cfg.rate,level:0,ultimate:false,farm:cfg.farm});
};

// ===== UPGRADES =====
function upgrade(t){
const c=upgradeCosts[t.key]||200;
if(t.level<3){
if(money<c) return;
money-=c;
t.level++;
if(!t.farm){t.dmg*=1.25;t.rate*=0.85;}
return;
}

if(t.ultimate) return;
const ult=towerTypes[t.key].ultCost;
if(money<ult) return;
money-=ult;
t.ultimate=true;
t.level=4;
}

// ===== ROUND =====
function startRound(){
if(spawning||gameWon) return;
roundEl.textContent=round;

if(round===30){
enemies.push(makeEnemy(boss));
spawning=true;
spawnLeft=0;
return;
}

spawnLeft=Math.floor(5+round*1.8);
spawnTimer=0;
spawning=true;
}

// ===== SPAWN =====
function spawnEnemy(){
const base=animals[Math.floor(Math.random()*animals.length)];

let hpScale=1+round*0.14;
let speedScale=1+round*0.02;

if(round>20){
const extra=round-20;
hpScale*=Math.pow(1.12,extra);
speedScale*=Math.pow(1.02,extra);
}

enemies.push(makeEnemy({
...base,
hp:Math.floor(base.hp*hpScale),
speed:base.speed*speedScale,
reward:Math.floor(base.reward*(1+round*0.15))
}));
}

function makeEnemy(t){
return {x:path[0].x,y:path[0].y,i:0,hp:t.hp,max:t.hp,
speed:t.speed,reward:t.reward,type:t.type,boss:t.boss};
}

// ===== UPDATE =====
function update(){
if(gameWon) return;

if(spawning && spawnLeft>0){
spawnTimer--;
if(spawnTimer<=0){
spawnEnemy();
spawnLeft--;
spawnTimer=60-Math.min(40,round);
}
if(spawnLeft===0 && enemies.length===0){
spawning=false;
round++;
roundEl.textContent=round;
}
}

for(const e of enemies){
const p=path[e.i+1]; if(!p) continue;
const dx=p.x-e.x,dy=p.y-e.y;
const d=Math.hypot(dx,dy);
if(d<e.speed) e.i++;
else {e.x+=dx/d*e.speed;e.y+=dy/d*e.speed;}
}

for(const t of towers){
if(t.farm) continue;
t.cool--; if(t.cool>0) continue;
const cfg=towerTypes[t.key];
const target=enemies.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<cfg.range);
if(!target) continue;
projectiles.push({x:t.x,y:t.y,tx:target.x,ty:target.y,target,speed:cfg.speed,dmg:t.dmg});
t.cool=t.rate;
}

for(const p of projectiles){
const dx=p.tx-p.x,dy=p.ty-p.y;
const d=Math.hypot(dx,dy);
if(d<p.speed){p.target.hp-=p.dmg;p.dead=true;}
else {p.x+=dx/d*p.speed;p.y+=dy/d*p.speed;}
}

enemies=enemies.filter(e=>{
if(e.hp<=0){
if(e.boss) winGame();
money+=e.reward;
return false;
}
return true;
});

projectiles=projectiles.filter(p=>!p.dead);

moneyEl.textContent=money;
livesEl.textContent=lives;
}

// ===== WIN =====
function winGame(){
gameWon=true;
spawning=false;
enemies=[];
projectiles=[];
}

// ===== DRAW =====
function drawEnemy(e){
ctx.save();
ctx.translate(e.x,e.y);
ctx.fillStyle='#666';
ctx.beginPath();
ctx.arc(0,0,10,0,Math.PI*2);
ctx.fill();
ctx.restore();
}

function drawTower(t){
ctx.fillStyle=towerTypes[t.key].color;
ctx.beginPath();
ctx.arc(t.x,t.y,10,0,Math.PI*2);
ctx.fill();
}

function drawEnding(){
ctx.fillStyle='rgba(0,0,0,.8)';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='white';
ctx.textAlign='center';
ctx.font='bold 36px sans-serif';
ctx.fillText('GEFELICITEERD!',450,220);
ctx.font='bold 22px sans-serif';
ctx.fillText('JE HEBT DE PLAAG IN TSJAAD OVERLEEFD!',450,270);
ctx.fillText('JE BENT TSJAADTASTISCH!',450,310);
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
towers.forEach(drawTower);
enemies.forEach(drawEnemy);
projectiles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();
});
if(gameWon) drawEnding();
}

// ===== LOOP =====
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>
