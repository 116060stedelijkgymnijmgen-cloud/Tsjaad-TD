<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const path = [
  {x:-20,y:260},{x:180,y:260},{x:180,y:120},{x:420,y:120},
  {x:420,y:380},{x:700,y:380},{x:700,y:220},{x:920,y:220}
];

let money=500, lives=20, round=1;
let selectedTower=null;
let enemies=[], towers=[], projectiles=[], explosions=[];
let spawning=false, spawnLeft=0, spawnTimer=0;
let gameWon=false;

// ===== TOWERS =====
const towerTypes={
  speer:{range:90,rate:40,dmg:3.6,speed:3.2,cost:80,color:'#2e6b3a',ultCost:800},
  boog:{range:130,rate:55,dmg:6,speed:2,cost:125,color:'#3a5a2e',ultCost:1000},

  // 20% langzamer (12 → 14.4)
  geweer:{range:9999,rate:14.4,dmg:1.4,speed:10,cost:400,color:'#444',ultCost:3000},

  tsjaadinator:{range:120,rate:5,dmg:2.8,speed:8,cost:2000,color:'#00bcd4',ultCost:15000},
  atoom:{range:180,rate:120,dmg:11.5,speed:3,cost:600,color:'#4caf50',bomb:true,ultCost:3500},
  katoen:{range:0,rate:9999,dmg:0,speed:0,cost:950,color:'#ffffff',farm:true,ultCost:6000}
};

// ===== UPGRADE KOSTEN =====
const upgradeCosts={
  speer:50,
  boog:100,
  atoom:350,
  geweer:300,
  tsjaadinator:800,
  katoen:200
};

// ===== ENEMIES =====
const animalTypes=[
  {name:'Giraffe',hp:4,speed:1.1,size:14,reward:10,type:'giraffe'},
  {name:'Leeuw',hp:6,speed:1.25,size:14,reward:12,type:'leeuw'},
  {name:'Neushoorn',hp:12,speed:0.95,size:18,reward:18,type:'neushoorn'},
  {name:'Olifant',hp:20,speed:0.8,size:20,reward:25,type:'olifant'}
];

const bossType={name:'Malaria Mug',hp:15000,speed:0.75,size:22,reward:1000,boss:true,type:'mug'};

// ===== SELECT =====
function selectTower(t){ selectedTower=t; }

// ===== CLICK =====
canvas.onclick=e=>{
  if(gameWon) return;
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;

  for(const tw of towers){
    if(Math.hypot(tw.x-x,tw.y-y)<18){ handleUpgrade(tw); return; }
  }

  if(!selectedTower) return;
  const cfg=towerTypes[selectedTower];
  if(money<cfg.cost) return;
  money-=cfg.cost;

  towers.push({
    x,y,key:selectedTower,cool:0,dmg:cfg.dmg,rate:cfg.rate,
    level:0,ultimate:false,upText:0,farm:cfg.farm||false
  });
};

// ===== UPGRADES =====
function handleUpgrade(t){
  const upCost = upgradeCosts[t.key] || 200;

  if(t.level<3){
    if(money<upCost) return;
    money-=upCost;
    t.level++;
    if(!t.farm){ t.dmg*=1.25; t.rate*=0.85; }
    t.upText=90;
    return;
  }

  if(t.ultimate) return;
  const cost=towerTypes[t.key].ultCost;
  if(money<cost) return;
  money-=cost;
  t.ultimate=true;
  t.level=4;

  if(t.key==='atoom'){ t.dmg*=1.8; t.rate*=0.55; }
  else if(t.key==='tsjaadinator'){ t.dmg*=0.5; t.rate*=1.9; }
  else if(t.key==='speer'){ t.dmg*=0.9; t.rate*=0.95; }
  else if(t.key==='geweer'){ t.dmg*=0.8; t.rate*=0.65; }

  t.upText=140;
}

// ===== ROUND =====
function startRound(){
  if(spawning || gameWon) return;
  document.getElementById('round').textContent=round;

  let farmCash=0;
  for(const t of towers){
    if(t.farm){
      const base=80+t.level*40+(t.ultimate?500:0);
      money+=base; farmCash+=base;
    }
  }

  showRoundMsg(farmCash?`🌾 €${farmCash}`:`▶️ Ronde ${round}`);

  if(round===30){ enemies.push(makeEnemy(bossType)); spawning=true; spawnLeft=0; return; }

  spawnLeft=Math.floor(5+round*1.8);
  spawning=true; spawnTimer=0;
}

function showRoundMsg(txt){
  const el=document.getElementById('roundMsg');
  el.textContent=txt;
  setTimeout(()=>el.textContent='',2000);
}

// ===== SPAWN =====
function spawnEnemy(){
  let base=animalTypes[Math.floor(Math.random()*animalTypes.length)];

  let hpScale=1+round*0.14;
  let speedScale=1+round*0.02;

  if(round>8){
    hpScale*=1+0.06*(round-8);
    speedScale*=1+0.01*(round-8);
  }

  // ✅ FIXED scaling na ronde 20
  if(round>20){
    const extra=round-20;
    hpScale*=Math.pow(1.20,extra);
    speedScale*=Math.pow(1.02,extra);
  }

  enemies.push(makeEnemy({
    ...base,
    hp:Math.floor(base.hp*hpScale),
    speed:base.speed*speedScale,
    reward:Math.floor(base.reward*(1+round*0.15))
  }));
}

function makeEnemy(t){
  return {x:path[0].x,y:path[0].y,i:0,hp:t.hp,max:t.hp,
          speed:t.speed,size:t.size,reward:t.reward,
          name:t.name,type:t.type,boss:t.boss};
}

// ===== UPDATE =====
function update(){
  if(spawning){
    spawnTimer--;
    if(spawnTimer<=0 && spawnLeft>0){
      spawnEnemy();
      spawnLeft--;
      spawnTimer=60-Math.min(40,round);
    }
    if(spawnLeft===0 && enemies.length===0){
      spawning=false;
      round=Math.min(30,round+1);
    }
  }

  for(const e of enemies){
    const p=path[e.i+1]; if(!p) continue;
    const dx=p.x-e.x, dy=p.y-e.y;
    const d=Math.hypot(dx,dy);
    if(d<e.speed) e.i++;
    else { e.x+=dx/d*e.speed; e.y+=dy/d*e.speed; }
    if(e.i>=path.length-1){ lives--; e.hp=0; }
  }

  for(const t of towers){
    if(t.upText>0) t.upText--;
    if(t.farm) continue;
    t.cool--; if(t.cool>0) continue;
    const cfg=towerTypes[t.key];
    const target=enemies.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<cfg.range);
    if(!target) continue;

    projectiles.push({
      x:t.x,y:t.y,tx:target.x,ty:target.y,target,
      speed:cfg.speed,dmg:t.dmg,bomb:cfg.bomb
    });
    t.cool=t.rate;
  }

  for(const p of projectiles){
    const dx=p.tx-p.x, dy=p.ty-p.y;
    const d=Math.hypot(dx,dy);
    if(d<p.speed){
      p.target.hp-=p.dmg;
      if(p.bomb) explosions.push({x:p.target.x,y:p.target.y,r:12,t:22});
      p.dead=true;
    } else {
      p.x+=dx/d*p.speed; p.y+=dy/d*p.speed;
    }
  }

  for(const ex of explosions){ ex.r+=2.5; ex.t--; }
  explosions=explosions.filter(e=>e.t>0);

  enemies=enemies.filter(e=>{
    if(e.hp<=0){
      if(e.boss) winGame();
      money+=e.reward;
      return false;
    }
    return true;
  });

  projectiles=projectiles.filter(p=>!p.dead);

  moneyEl.textContent=money;
  livesEl.textContent=lives;
}

function winGame(){
  gameWon=true;
  showRoundMsg('🏆 Tsjaadtastisch gewonnen!');
}

// ===== BETERE SPRITES =====
function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);

  if(e.type==='olifant'){
    ctx.fillStyle='#777';
    ctx.fillRect(-16,-10,32,20);
    ctx.fillRect(10,-4,12,8);
    ctx.beginPath(); ctx.arc(-6,0,6,0,Math.PI*2); ctx.fillStyle='#999'; ctx.fill();
  }

  else if(e.type==='neushoorn'){
    ctx.fillStyle='#666';
    ctx.beginPath();
    ctx.ellipse(0,0,14,10,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#ddd';
    ctx.fillRect(12,-2,8,4);
  }

  else if(e.type==='giraffe'){
    ctx.fillStyle='#d8a45c';
    ctx.fillRect(-8,-10,16,20);
    ctx.fillRect(4,-20,6,12);
    ctx.fillStyle='#8b5a2b';
    ctx.fillRect(-6,-6,4,4);
    ctx.fillRect(2,2,4,4);
  }

  else if(e.type==='leeuw'){
    ctx.fillStyle='#c48a3a';
    ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#8b5a2b';
    ctx.lineWidth=3;
    ctx.stroke();
  }

  else if(e.type==='mug'){
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#aaa';
    ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(14,0); ctx.stroke();
  }

  ctx.fillStyle='red'; ctx.fillRect(-18,-22,36,4);
  ctx.fillStyle='lime'; ctx.fillRect(-18,-22,36*(e.hp/e.max),4);

  ctx.restore();
}

function drawTower(t){
  ctx.save();
  ctx.translate(t.x,t.y);

  if(t.key==='geweer'){
    // betere soldaat sprite
    ctx.fillStyle='#2b2b2b';
    ctx.fillRect(-7,-10,14,16);
    ctx.fillStyle='#f2c29b';
    ctx.beginPath(); ctx.arc(0,-14,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333';
    ctx.fillRect(6,-4,12,3);
  }

  else{
    ctx.fillStyle=towerTypes[t.key].color;
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  }

  const nextCost = t.level<3
    ? (upgradeCosts[t.key]||200)
    : (!t.ultimate ? towerTypes[t.key].ultCost : 0);

  ctx.fillStyle='white';
  ctx.font='10px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(t.level<3?`${t.level}/4 (€${nextCost})`:(t.ultimate?'ULT':'ULT €'+nextCost),0,22);

  ctx.restore();
}

// ===== DRAW =====
function drawPath(){
  ctx.strokeStyle='#c2b280';
  ctx.lineWidth=26;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(path[0].x,path[0].y);
  for(const p of path) ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPath();
  towers.forEach(drawTower);
  enemies.forEach(drawEnemy);

  for(const p of projectiles){
    ctx.fillStyle=p.bomb?'green':'black';
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.bomb?7:3,0,Math.PI*2);
    ctx.fill();
  }

  for(const ex of explosions){
    ctx.globalAlpha=ex.t/22;
    ctx.fillStyle='lime';
    ctx.beginPath();
    ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ===== LOOP =====
const moneyEl=document.getElementById('money');
const livesEl=document.getElementById('lives');

function loop(){
  update();
  draw();
  if(lives>0) requestAnimationFrame(loop);
}
loop();
</script>
