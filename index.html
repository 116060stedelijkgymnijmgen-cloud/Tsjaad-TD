<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Tsjaad TD – 30 Rondes</title>
<style>
  body { margin:0; background:#1e1e1e; color:white; font-family:sans-serif; display:flex; }
  #ui { width:260px; padding:12px; background:#2b2b2b; box-sizing:border-box; }
  #gameWrap { flex:1; display:flex; justify-content:center; align-items:center; }
  canvas { background:#7ab86d; border:3px solid #111; }
  button { width:100%; margin:6px 0; padding:10px; font-size:14px; cursor:pointer; }
  .small { font-size:12px; opacity:.9 }
</style>
</head>
<body>

<div id="ui">
  <h2>🛡️ Tsjaad TD</h2>
  <div>💰 Geld: <span id="money">500</span></div>
  <div>❤️ Levens: <span id="lives">20</span></div>
  <div>🌊 Ronde: <span id="round">1</span>/30</div>
  <div id="roundMsg" class="small"></div>

  <button onclick="selectTower('speer')">Speer Werper (€80)</button>
  <button onclick="selectTower('boog')">Boog Schutter (€125)</button>
  <button onclick="selectTower('geweer')">Soldaat (€550)</button>
  <button onclick="selectTower('atoom')">Atoombommenwerper (€600)</button>
  <button onclick="selectTower('katoen')">Katoen Plantage (€950)</button>
  <button onclick="selectTower('tsjaadinator')">Tsjaadinator (€2500)</button>

  <button onclick="startRound()">▶️ Start Ronde</button>
  <p class="small">Klik toren = upgrade. Max 4 (ultimate).</p>
</div>

<div id="gameWrap">
  <canvas id="game" width="900" height="520"></canvas>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const path = [
  {x:-20,y:260},{x:180,y:260},{x:180,y:120},{x:420,y:120},
  {x:420,y:380},{x:700,y:380},{x:700,y:220},{x:920,y:220}
];

let money=500, lives=20, round=1;
let selectedTower=null;
let enemies=[], towers=[], projectiles=[], explosions=[];
let spawning=false, spawnLeft=0, spawnTimer=0;
let gameWon=false;

// ===== TOWERS =====
const towerTypes={
  speer:{range:90,rate:40,dmg:3.6,speed:3.2,cost:80,color:'#2e6b3a',ultCost:800},
  boog:{range:130,rate:55,dmg:7,speed:2,cost:125,color:'#3a5a2e',ultCost:2000},
  geweer:{range:9999,rate:12,dmg:1.4,speed:6,cost:550,color:'#444',ultCost:3000},
  tsjaadinator:{range:120,rate:5,dmg:2.8,speed:8,cost:2500,color:'#00bcd4',ultCost:15000},
  atoom:{range:180,rate:120,dmg:18,speed:3,cost:600,color:'#4caf50',bomb:true,ultCost:3500},
  katoen:{range:0,rate:9999,dmg:0,speed:0,cost:950,color:'#ffffff',farm:true,ultCost:4000}
};

// ===== ENEMIES =====
const animalTypes=[
  {name:'Giraffe',hp:4,speed:1.1,size:14,reward:10,type:'giraffe'},
  {name:'Leeuw',hp:6,speed:1.25,size:14,reward:12,type:'leeuw'},
  {name:'Neushoorn',hp:12,speed:0.95,size:18,reward:18,type:'neushoorn'},
  {name:'Olifant',hp:20,speed:0.8,size:20,reward:25,type:'olifant'},
  {name:'Cheetah',hp:4,speed:1.8,size:14,reward:15,type:'cheetah',minRound:15}
];

const bossType = {name:'Malaria Mug',hp:25000,speed:0.75,size:152,reward:1000,boss:true,type:'mug'};

// ===== TOWER SELECTION =====
function selectTower(t){ selectedTower=t; }

// ===== CLICK =====
canvas.onclick=e=>{
  if(gameWon) return;
  const r=canvas.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;

  for(const tw of towers){
    const towerSize = 18 * (1 + tw.level * 0.05);
    if(Math.hypot(tw.x-x,tw.y-y)<towerSize){ handleUpgrade(tw); return; }
  }

  if(!selectedTower) return;
  const cfg=towerTypes[selectedTower];
  if(money<cfg.cost) return;
  money-=cfg.cost;

  towers.push({x,y,key:selectedTower,cool:0,dmg:cfg.dmg,rate:cfg.rate,level:0,ultimate:false,upText:0,farm:cfg.farm||false});
};

function handleUpgrade(t){
  // Verschillende upgrade kosten per tower
  let upgradeCost;
  if(t.key === 'speer') upgradeCost = 50;
  else if(t.key === 'boog') upgradeCost = 100;
  else if(t.key === 'geweer') upgradeCost = 350;
  else if(t.key === 'atoom') upgradeCost = 500;
  else if(t.key === 'tsjaadinator') upgradeCost = 2000;
  else if(t.key === 'katoen') upgradeCost = 200;
  else upgradeCost = 200;

  if(t.level<3){
    if(money<upgradeCost) return;
    money-=upgradeCost;
    t.level++;
    if(!t.farm){ t.dmg*=1.25; t.rate*=0.85; }
    t.upText=90;
    return;
  }

  if(t.ultimate) return;
  const cost = towerTypes[t.key].ultCost;
  if(money<cost) return;
  money-=cost;
  t.ultimate=true;
  t.level=4;

  if(t.key==='atoom'){ t.dmg*=3.8; t.rate*=0.55; }
  else if(t.key==='tsjaadinator'){ t.dmg*=2; t.rate*=0.25; }
  else if(t.key==='speer'){ t.dmg*=3; t.rate*=1.2; }
  else if(t.key==='geweer'){ t.dmg*=2.8; t.rate*=0.35; }
  else if(t.key==='boog'){ t.dmg*=3; t.rate*=0.50; }
  t.upText=140;
}

// ===== ROUND =====
function startRound(){
  if(spawning || gameWon) return;
  document.getElementById('round').textContent=round;

  let farmCash=0;
  for(const t of towers){
    if(t.farm){
      const base = 80 + t.level*40 + (t.ultimate?500:0);
      money += base;
      farmCash += base;
    }
  }
  showRoundMsg(farmCash>0 ? `🌾 Plantages verdienden €${farmCash}` : `▶️ Ronde ${round} gestart`);

  if(round === 30){ 
    spawnLeft = 1;
    spawning = true; 
    return; 
  }

  spawnLeft = Math.floor(5 + round*1.8);
  spawning = true;
  spawnTimer = 0;
}

function showRoundMsg(txt){ 
  const el=document.getElementById('roundMsg'); 
  el.textContent=txt; 
  setTimeout(()=>el.textContent='',2000); 
}

// ===== SPAWN ENEMIES =====
function spawnEnemy(){
  if(round === 30){
    enemies.push(makeEnemy({...bossType}));
    return;
  }

  // Filter dieren op basis van ronde
  const availableAnimals = animalTypes.filter(a => !a.minRound || round >= a.minRound);
  let base = availableAnimals[Math.floor(Math.random()*availableAnimals.length)];
  
  let hpScale = 1 + round*0.14;
  let speedScale = 1 + round*0.02;

  if(round > 8){
    hpScale *= 1 + 0.08*(round-8);
    speedScale *= 1 + 0.01*(round-8);
  }

  if(round > 20){
    hpScale *= 1.70;
    speedScale *= 1.3;
  }

  enemies.push(makeEnemy({
    ...base,
    hp: Math.floor(base.hp*hpScale),
    speed: base.speed*speedScale,
    reward: Math.floor(base.reward*(1+round*0.15))
  }));
}

function makeEnemy(t){ 
  return {x:path[0].x,y:path[0].y,i:0,hp:t.hp,max:t.hp,speed:t.speed,size:t.size,reward:t.reward,name:t.name,type:t.type,boss:t.boss}; 
}

// ===== WIN & LOSS =====
function winGame(){
  gameWon=true;
  document.getElementById('roundMsg').textContent = '🏆 GEFELICITEERD! JE HEBT DE PLAAG IN TSJAAD OVERLEEFD! JE BENT TSJAADTASTISCH!';
}

function loseGame(){
  gameWon=true;
  document.getElementById('roundMsg').textContent = '💀 je hebt helaas verloren LOOOOSER';
}

// ===== UPDATE =====
function update(){
  if(spawning){
    spawnTimer--;
    if(spawnTimer<=0 && spawnLeft>0){ spawnEnemy(); spawnLeft--; spawnTimer=60-Math.min(40,round); }
    if(spawnLeft===0 && enemies.length===0){ 
      spawning=false; 
      if(round<30) round=Math.min(30,round+1); 
    }
  }

  for(const e of enemies){
    const p=path[e.i+1]; if(!p) continue;
    const dx=p.x-e.x, dy=p.y-e.y;
    const d=Math.hypot(dx,dy);
    if(d<e.speed){ e.i++; } else { e.x+=dx/d*e.speed; e.y+=dy/d*e.speed; }

    if(e.boss && e.i>=path.length-1){ lives=0; loseGame(); }
  }

  for(const t of towers){
    if(t.upText>0) t.upText--;
    if(t.farm) continue;
    t.cool--; if(t.cool>0) continue;
    const cfg=towerTypes[t.key];
    const target=enemies.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<cfg.range);
    if(!target) continue;
    projectiles.push({
      x:t.x,y:t.y,tx:target.x,ty:target.y,target,
      speed:cfg.speed,dmg:t.dmg,bomb:cfg.bomb,
      gold:t.ultimate,
      towerKey:t.key
    });
    t.cool=t.rate;
  }

  for(const p of projectiles){
    const dx=p.tx-p.x, dy=p.ty-p.y;
    const d=Math.hypot(dx,dy);
    if(d<p.speed){ 
      p.target.hp-=p.dmg; 
      if(p.bomb) explosions.push({x:p.target.x,y:p.target.y,r:12,t:22,gold:p.gold}); 
      p.dead=true; 
    } else { p.x+=dx/d*p.speed; p.y+=dy/d*p.speed; }
  }

  for(const ex of explosions){ ex.r+=2.5; ex.t--; }
  explosions=explosions.filter(e=>e.t>0);

  enemies=enemies.filter(e=>{
    if(e.hp<=0){ 
      if(e.boss){ winGame(); } 
      money+=e.reward; 
      return false;
    } 
    if(e.i>=path.length-1){ 
      lives--; 
      if(lives<=0) loseGame(); 
      return false;
    } 
    return true; 
  });
  projectiles=projectiles.filter(p=>!p.dead);

  document.getElementById('money').textContent=money;
  document.getElementById('lives').textContent=lives;
}

// ===== DRAW =====
function drawPath(){ 
  // Gras achtergrond
  ctx.fillStyle = '#7ab86d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Weg/pad
  ctx.strokeStyle = '#c2b280';
  ctx.lineWidth = 26;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for (const p of path) {
    ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // Weg rand (donkerder)
  ctx.strokeStyle = '#a89968';
  ctx.lineWidth = 28;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for (const p of path) {
    ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawEnemy(e){
  ctx.save(); 
  ctx.translate(e.x,e.y);
  
  if(e.type==='olifant'){
    // Realistische olifant
    ctx.fillStyle='#8b8b8b';
    // Lichaam
    ctx.beginPath();
    ctx.ellipse(0,0,16,12,0,0,Math.PI*2);
    ctx.fill();
    // Hoofd
    ctx.beginPath();
    ctx.ellipse(14,-2,8,7,0,0,Math.PI*2);
    ctx.fill();
    // Slurf
    ctx.strokeStyle='#8b8b8b';
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(20,-2);
    ctx.quadraticCurveTo(26,4,24,10);
    ctx.stroke();
    // Oren
    ctx.fillStyle='#7a7a7a';
    ctx.beginPath();
    ctx.ellipse(12,-8,5,6,0,0,Math.PI*2);
    ctx.fill();
    // Poten
    ctx.fillRect(-12,8,4,6);
    ctx.fillRect(-4,8,4,6);
    ctx.fillRect(4,8,4,6);
    ctx.fillRect(12,8,4,6);
  }
  else if(e.type==='neushoorn'){
    // Realistische neushoorn
    ctx.fillStyle='#6b6b6b';
    // Lichaam
    ctx.fillRect(-14,-10,28,18);
    // Hoofd
    ctx.fillRect(10,-8,10,14);
    // Hoorn
    ctx.fillStyle='#d4d4d4';
    ctx.beginPath();
    ctx.moveTo(20,-4);
    ctx.lineTo(28,-6);
    ctx.lineTo(20,-2);
    ctx.fill();
    // Poten
    ctx.fillStyle='#5a5a5a';
    ctx.fillRect(-12,8,5,8);
    ctx.fillRect(-2,8,5,8);
    ctx.fillRect(8,8,5,8);
  }
  else if(e.type==='giraffe'){
    // Realistische giraffe
    ctx.fillStyle='#daa520';
    // Lichaam
    ctx.fillRect(-12,-8,20,14);
    // Nek
    ctx.fillRect(6,-20,5,12);
    // Hoofd
    ctx.beginPath();
    ctx.ellipse(8.5,-22,4,3,0,0,Math.PI*2);
    ctx.fill();
    // Vlekken
    ctx.fillStyle='#8b4513';
    ctx.fillRect(-8,-4,3,3);
    ctx.fillRect(-2,-6,3,3);
    ctx.fillRect(2,0,3,3);
    // Poten
    ctx.fillStyle='#b8860b';
    ctx.fillRect(-10,6,3,10);
    ctx.fillRect(-2,6,3,10);
    ctx.fillRect(4,6,3,10);
  }
  else if(e.type==='leeuw'){
    // Realistische leeuw
    ctx.fillStyle='#cd853f';
    // Lichaam
    ctx.fillRect(-12,-8,22,14);
    // Hoofd met manen
    ctx.fillStyle='#8b6914';
    ctx.beginPath();
    ctx.arc(12,-2,8,0,Math.PI*2);
    ctx.fill();
    // Gezicht
    ctx.fillStyle='#cd853f';
    ctx.beginPath();
    ctx.arc(12,-2,5,0,Math.PI*2);
    ctx.fill();
    // Staart
    ctx.strokeStyle='#cd853f';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(-12,0);
    ctx.lineTo(-20,2);
    ctx.stroke();
    // Poten
    ctx.fillRect(-8,6,3,8);
    ctx.fillRect(0,6,3,8);
    ctx.fillRect(8,6,3,8);
  }
  else if(e.type==='cheetah'){
    // Realistische cheetah
    ctx.fillStyle='#daa520';
    // Lichaam (slanker dan leeuw)
    ctx.fillRect(-10,-6,20,11);
    // Hoofd
    ctx.fillStyle='#daa520';
    ctx.beginPath();
    ctx.arc(12,-1,6,0,Math.PI*2);
    ctx.fill();
    // Zwarte traan strepen
    ctx.strokeStyle='#000';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(14,-4);
    ctx.lineTo(14,2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(10,-4);
    ctx.lineTo(10,2);
    ctx.stroke();
    // Vlekken
    ctx.fillStyle='#8b4513';
    ctx.fillRect(-6,-3,2,2);
    ctx.fillRect(-2,-5,2,2);
    ctx.fillRect(2,-2,2,2);
    ctx.fillRect(6,-4,2,2);
    // Staart (lang en dun)
    ctx.strokeStyle='#daa520';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(-10,0);
    ctx.lineTo(-18,4);
    ctx.stroke();
    // Poten (lang en dun voor snelheid)
    ctx.fillRect(-7,5,2,9);
    ctx.fillRect(-1,5,2,9);
    ctx.fillRect(7,5,2,9);
  }
  else if(e.type==='mug'){
    // Realistische malaria mug
    ctx.fillStyle='#1a1a1a';
    // Lichaam
    ctx.beginPath();
    ctx.ellipse(0,0,12,5,0,0,Math.PI*2);
    ctx.fill();
    // Vleugels
    ctx.fillStyle='rgba(200,200,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(-8,-4,10,6,-0.3,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8,-4,10,6,0.3,0,Math.PI*2);
    ctx.fill();
    // Poten
    ctx.strokeStyle='#2a2a2a';
    ctx.lineWidth=1.5;
    for(let i=-1;i<=1;i++){
      ctx.beginPath();
      ctx.moveTo(i*6,4);
      ctx.lineTo(i*8,12);
      ctx.stroke();
    }
    // Steeksnuit
    ctx.strokeStyle='#3a3a3a';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(12,0);
    ctx.lineTo(20,0);
    ctx.stroke();
  }

  // Health bar
  ctx.fillStyle='red'; 
  ctx.fillRect(-20,-24,40,5);
  ctx.fillStyle='lime'; 
  ctx.fillRect(-20,-24,40*(e.hp/e.max),5);
  ctx.fillStyle='white'; 
  ctx.font='10px sans-serif'; 
  ctx.textAlign='center'; 
  ctx.fillText(e.name,0,-28);
  ctx.restore();
}

function drawTower(t){
  const cfg = towerTypes[t.key];
  const scale = 1 + t.level * 0.05;

  ctx.save();
  ctx.translate(t.x, t.y);
  ctx.scale(scale, scale);

  // ---------------- SPEER ----------------
  if(t.key === 'speer'){
    ctx.fillStyle = t.ultimate ? '#9b59b6' : '#3f8f4a';
    ctx.beginPath();
    ctx.arc(0,0,9,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = t.ultimate ? '#8e44ad' : '#e0e0e0';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-12,0);
    ctx.lineTo(12,0);
    ctx.stroke();

    ctx.fillStyle = t.ultimate ? '#dcd6f7' : '#ccc';
    ctx.beginPath();
    ctx.moveTo(12,0);
    ctx.lineTo(6,-4);
    ctx.lineTo(6,4);
    ctx.fill();

    if(t.level >= 2){
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8,-6);
      ctx.lineTo(8,-6);
      ctx.stroke();

      ctx.fillStyle = '#ccc';
      ctx.beginPath();
      ctx.moveTo(8,-6);
      ctx.lineTo(4,-9);
      ctx.lineTo(4,-3);
      ctx.fill();
    }

    if(t.level >= 3){
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8,6);
      ctx.lineTo(8,6);
      ctx.stroke();

      ctx.fillStyle = '#ccc';
      ctx.beginPath();
      ctx.moveTo(8,6);
      ctx.lineTo(4,3);
      ctx.lineTo(4,9);
      ctx.fill();
    }
  }

  // ---------------- BOOG ----------------
  else if(t.key === 'boog'){
    ctx.strokeStyle = t.ultimate ? '#3498db' : '#c68642';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0,0,10,-Math.PI/2,Math.PI/2);
    ctx.stroke();

    ctx.strokeStyle = t.ultimate ? '#5dade2' : '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(0,10);
    ctx.stroke();

    ctx.fillStyle = t.ultimate ? '#21618c' : '#8b5a2b';
    ctx.fillRect(-3,-3,6,6);

    if(t.level >= 2){
      ctx.strokeStyle = '#c68642';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(-6,0,8,-Math.PI/2,Math.PI/2);
      ctx.stroke();
    }

    if(t.level >= 3){
      ctx.strokeStyle = '#c68642';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(6,0,8,-Math.PI/2,Math.PI/2);
      ctx.stroke();
    }
  }

  // ---------------- GEWEER ----------------
  else if(t.key === 'geweer'){
    ctx.fillStyle = t.ultimate ? '#2c3e50' : '#444';
    ctx.fillRect(-8,-6,16,12);

    ctx.fillStyle = t.ultimate ? '#2980b9' : '#777';
    ctx.fillRect(8,-2,10,4);

    ctx.fillStyle = t.ultimate ? '#ecf0f1' : '#999';
    ctx.fillRect(-4,-14,8,6);

    if(t.level >= 2){
      ctx.fillStyle = '#777';
      ctx.fillRect(-7,3,2,8);
      ctx.fillRect(5,3,2,8);
    }

    if(t.level >= 3){
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0,-4,7,0,Math.PI);
      ctx.stroke();
    }
  }

  // ---------------- ATOOM ----------------
  else if(t.key === 'atoom'){
    ctx.fillStyle = t.ultimate ? '#e74c3c' : '#4caf50';
    ctx.beginPath();
    ctx.arc(0,0,10,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = t.ultimate ? '#e67e22' : '#b2ffb2';
    ctx.beginPath();
    ctx.arc(0,0,5,0,Math.PI*2);
    ctx.fill();

    const symbols = t.level >= 3 ? 4 : 3;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    for(let i=0; i<symbols; i++){
      ctx.save();
      ctx.rotate(i*Math.PI*2/symbols);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(0,-8);
      ctx.stroke();
      ctx.restore();
    }

    if(t.level >= 3){
      ctx.fillStyle = '#76ff03';
      ctx.beginPath();
      ctx.arc(0,0,3,0,Math.PI*2);
      ctx.fill();
    }
  }

  // ---------------- KATOEN ----------------
  else if(t.key === 'katoen'){
    ctx.fillStyle = t.ultimate ? '#27ae60' : '#e8e2b8';
    ctx.fillRect(-12,-12,24,24);

    ctx.fillStyle = t.ultimate ? '#2ecc71' : '#fff';
    ctx.beginPath();
    ctx.arc(0,0,7,0,Math.PI*2);
    ctx.fill();

    const bollen = [[0,0],[-4,-4],[4,-4],[4,4],[-4,4]];
    for(let i=1; i<=t.level && i<bollen.length; i++){
      ctx.beginPath();
      ctx.arc(bollen[i][0], bollen[i][1], 3,0,Math.PI*2);
      ctx.fill();
    }
  }

  // ---------------- TSJAADINATOR ----------------
  else if(t.key === 'tsjaadinator'){
    ctx.fillStyle = t.ultimate ? '#00ffff' : '#00bcd4';
    ctx.beginPath();
    ctx.arc(0,0,11,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = t.ultimate ? '#003366' : '#00363a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-10,-10);
    ctx.lineTo(10,10);
    ctx.moveTo(10,-10);
    ctx.lineTo(-10,10);
    ctx.stroke();

    if(t.level >= 2){
      ctx.strokeStyle = '#00bcd4';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0,0,8,0,Math.PI*2);
      ctx.stroke();
    }

    if(t.level >= 3){
      ctx.strokeStyle = '#00bcd4';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0,0,5,0,Math.PI*2);
      ctx.stroke();
    }
  }

  ctx.fillStyle='white'; 
  ctx.font='10px sans-serif'; 
  ctx.textAlign='center';
  
  // Verschillende upgrade kosten per tower
  let nextCost;
  if(t.level < 3){
    if(t.key === 'speer') nextCost = 50;
    else if(t.key === 'boog') nextCost = 100;
    else if(t.key === 'geweer') nextCost = 350;
    else if(t.key === 'atoom') nextCost = 500;
    else if(t.key === 'tsjaadinator') nextCost = 2000;
    else if(t.key === 'katoen') nextCost = 200;
    else nextCost = 200;
  } else {
    nextCost = t.ultimate ? 0 : cfg.ultCost;
  }
  
  const label = t.level<3 ? `${t.level}/4 (€${nextCost})` : (t.ultimate? 'ULTIMATE' : `ULTIMATE (€${cfg.ultCost})`);
  ctx.fillText(label,0,24/scale);

  if(t.upText>0){ 
    ctx.fillStyle='yellow'; 
    ctx.fillText('UPGRADED',0,-18/scale); 
  }
  ctx.restore();
}

// ===== DRAW PROJECTILES & EXPLOSIONS =====
function drawProjectiles(){
  for(const p of projectiles){
    ctx.save();
    ctx.translate(p.x, p.y);
    
    // Bereken hoek naar doel
    const angle = Math.atan2(p.ty - p.y, p.tx - p.x);
    ctx.rotate(angle);
    
    if(p.towerKey === 'atoom'){
      // Groene bom voor atoombommenwerper
      if(p.gold){
        // Gouden bom voor ultimate
        ctx.fillStyle='#ffd700';
        ctx.strokeStyle='#ffed4e';
      } else {
        // Normale groene bom
        ctx.fillStyle='#2d5016';
        ctx.strokeStyle='#4caf50';
      }
      
      // Bom lichaam (kleiner)
      ctx.beginPath();
      ctx.arc(0,0,5,0,Math.PI*2);
      ctx.fill();
      ctx.lineWidth=1.5;
      ctx.stroke();
      
      // Lont
      ctx.strokeStyle = p.gold ? '#ff6b35' : '#ff4444';
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(-1.5,-5);
      ctx.lineTo(-2,-9);
      ctx.stroke();
      
      // Vonk
      ctx.fillStyle = p.gold ? '#ffaa00' : '#ff6b35';
      ctx.beginPath();
      ctx.arc(-2,-9,1.5,0,Math.PI*2);
      ctx.fill();
    } 
    else if(p.towerKey === 'speer'){
      // Speer voor speerwerper (kleiner)
      if(p.gold){
        ctx.strokeStyle='#ffd700';
        ctx.fillStyle='#ffd700';
      } else {
        ctx.strokeStyle='#8b7355';
        ctx.fillStyle='#c0c0c0';
      }
      
      // Speer schacht
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(-9,0);
      ctx.lineTo(6,0);
      ctx.stroke();
      
      // Speer punt
      ctx.beginPath();
      ctx.moveTo(6,0);
      ctx.lineTo(11,-3);
      ctx.lineTo(11,3);
      ctx.closePath();
      ctx.fill();
      
      if(p.gold){
        ctx.strokeStyle='#ffed4e';
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }
    else if(p.towerKey === 'boog'){
      // Pijl voor boogschutter (kleiner)
      if(p.gold){
        ctx.strokeStyle='#ffd700';
        ctx.fillStyle='#ffd700';
      } else {
        ctx.strokeStyle='#8b4513';
        ctx.fillStyle='#a0522d';
      }
      
      // Pijl schacht
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(-8,0);
      ctx.lineTo(8,0);
      ctx.stroke();
      
      // Pijl punt
      ctx.fillStyle = p.gold ? '#ffd700' : '#696969';
      ctx.beginPath();
      ctx.moveTo(8,0);
      ctx.lineTo(11,-2.5);
      ctx.lineTo(11,2.5);
      ctx.closePath();
      ctx.fill();
      
      // Veren
      ctx.fillStyle = p.gold ? '#ffed4e' : '#f5f5dc';
      ctx.beginPath();
      ctx.moveTo(-8,-2.5);
      ctx.lineTo(-10,-1);
      ctx.lineTo(-8,0);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-8,2.5);
      ctx.lineTo(-10,1);
      ctx.lineTo(-8,0);
      ctx.closePath();
      ctx.fill();
    }
    else if(p.towerKey === 'tsjaadinator'){
      // Blauwe speer voor tsjaadinator (kleiner)
      if(p.gold){
        ctx.strokeStyle='#ffd700';
        ctx.fillStyle='#00ffff';
      } else {
        ctx.strokeStyle='#00bcd4';
        ctx.fillStyle='#00e5ff';
      }
      
      // Speer schacht (blauw)
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(-9,0);
      ctx.lineTo(7,0);
      ctx.stroke();
      
      // Speer punt (cyan)
      ctx.beginPath();
      ctx.moveTo(7,0);
      ctx.lineTo(12,-3);
      ctx.lineTo(12,3);
      ctx.closePath();
      ctx.fill();
      
      // Glow effect
      if(p.gold){
        ctx.strokeStyle='#ffed4e';
      } else {
        ctx.strokeStyle='#80deea';
      }
      ctx.lineWidth=1;
      ctx.stroke();
    }
    else if(p.towerKey === 'geweer'){
      // Gele kogel voor soldaat (kleiner)
      ctx.fillStyle = p.gold ? '#ffd700' : '#ffeb3b';
      ctx.beginPath();
      ctx.ellipse(0,0,3.5,1.5,0,0,Math.PI*2);
      ctx.fill();
      
      if(p.gold){
        ctx.strokeStyle='#ffed4e';
        ctx.lineWidth=1;
        ctx.stroke();
      }
    }
    else {
      // Fallback voor andere towers
      ctx.fillStyle = p.gold ? '#ffd700' : 'black';
      ctx.beginPath();
      ctx.arc(0,0,2.5,0,Math.PI*2);
      ctx.fill();
    }
    
    ctx.restore();
  }
}

function drawExplosions(){
  for(const ex of explosions){
    ctx.globalAlpha = ex.t / 22;
    
    if(ex.gold){
      // Gouden explosie
      const gradient = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, ex.r);
      gradient.addColorStop(0, '#ffd700');
      gradient.addColorStop(0.5, '#ffed4e');
      gradient.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = gradient;
    } else {
      // Groene explosie
      const gradient = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, ex.r);
      gradient.addColorStop(0, '#4caf50');
      gradient.addColorStop(0.5, '#8bc34a');
      gradient.addColorStop(1, 'rgba(76,175,80,0)');
      ctx.fillStyle = gradient;
    }
    
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.globalAlpha = 1;
  }
}

// ===== MAIN DRAW =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPath();
  towers.forEach(drawTower);
  enemies.forEach(drawEnemy);
  drawProjectiles();
  drawExplosions();
}

// ===== LOOP =====
function loop(){ 
  update(); 
  draw(); 
  if(!gameWon) requestAnimationFrame(loop); 
}
loop();
</script>
